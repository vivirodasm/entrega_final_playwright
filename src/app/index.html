<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Asíncrono - Frontend Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <h1>Registro de Usuario</h1>
        <p class="subtitle">Entorno base para automatización front-end</p>

        <form id="registro-form" class="form" novalidate>
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" placeholder="Ej: Ana QA" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="ana@example.com" required />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="********" required />

          <button id="btn-registrar" type="submit">Registrar</button>
        </form>

        <div id="status-box" aria-live="polite" class="status idle">
          Estado: Esperando registro...
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
